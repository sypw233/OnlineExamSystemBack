spring.application.name=OnlineExamSystemBack

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/exam_system
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Springdoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
jwt.secret=ovoSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=7200000
jwt.refresh-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.path=./uploads/

# Logging Configuration
logging.level.org.springframework.web.servlet.resource=WARN
logging.level.org.apache.catalina.connector.ClientAbortException=OFF
