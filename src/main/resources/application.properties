spring.application.name=OnlineExamSystemBack

# Server Configuration
server.address=0.0.0.0
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/exam_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Springdoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration - MUST set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:dev-only-secret-key-at-least-32-characters-long-for-local-testing}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload.path=./uploads/
file.upload.max-image-size=${FILE_MAX_IMAGE_SIZE:5MB}
file.upload.max-document-size=${FILE_MAX_DOCUMENT_SIZE:20MB}

# Logging Configuration
logging.level.org.springframework.web.servlet.resource=WARN
logging.level.org.apache.catalina.connector.ClientAbortException=OFF

# Baidu Cloud BOS settings - MUST set env vars in production
baidu.bos.access-key-id=${BOS_ACCESS_KEY_ID:placeholder}
baidu.bos.secret-access-key=${BOS_SECRET_ACCESS_KEY:placeholder}
baidu.bos.endpoint=${BOS_ENDPOINT:gz.bcebos.com}
baidu.bos.bucket-name=${BOS_BUCKET_NAME:sypw-exam-system}

# Statistics Configuration
statistics.passing-score=${STATISTICS_PASSING_SCORE:60}

# OpenAI API settings
# Configure via /api/ai-grading/config API or environment variables
# OPENAI_API_KEY - API secret key
# OPENAI_API_BASE_URL - API base URL (default: https://api.openai.com/v1)
