spring.application.name=OnlineExamSystemBack

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/exam_system
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Springdoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
jwt.secret=OnlineExamSystemSecretKeyForJWTTokenGeneration2024VeryLongAndSecureKey
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload.path=./uploads/

# Logging Configuration
logging.level.org.springframework.web.servlet.resource=WARN
logging.level.org.apache.catalina.connector.ClientAbortException=OFF

# Baidu Cloud BOS settings
# Please configure these values in environment variables or replace with actual values
baidu.bos.access-key-id=${BOS_ACCESS_KEY_ID:ALTAKs6sc336vJgZezjbGIXq5Q}
baidu.bos.secret-access-key=${BOS_SECRET_ACCESS_KEY:14d99dd781994e859bdf2ecc8c603464}
baidu.bos.endpoint=${BOS_ENDPOINT:gz.bcebos.com}
baidu.bos.bucket-name=${BOS_BUCKET_NAME:sypw-exam-system}

# OpenAI API settings
# Please configure these values in environment variables
openai.api-key=${OPENAI_API_KEY:your-openai-api-key}
openai.api-base-url=${OPENAI_API_BASE_URL:https://api.openai.com/v1}
